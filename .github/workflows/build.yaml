name: Build & Release APK

on:
  # 只在「刻意」時建置：推 v* tag（發 Release）或手動觸發（只出 artifact）。
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # 建立 GitHub Release 需要

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整歷史與 tag，才能算出上一版 tag 與 compare 連結

      - uses: ./.github/actions/setup-project

      # 從 secrets 還原 upload keystore 與 key.properties，讓 release build
      # 用正式（上傳）金鑰簽章。這兩個檔案都在 .gitignore，不會進版控。
      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK & AAB
        run: |
          flutter build apk --release --dart-define=USE_FIREBASE=true
          flutter build appbundle --release --dart-define=USE_FIREBASE=true

      - name: Upload APK & AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundles
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # 推 tag 時，建立「草稿」GitHub Release 並附上 APK（永久下載連結）。
      # draft: true → 自動預填變更說明並附好 APK，但先不公開；
      # 你可在 Releases 頁面補寫「這版改了什麼」後再手動按 Publish。
      - name: Create GitHub Release (draft)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: true

      # 從 pubspec.yaml 讀出版本，組出 Play 的版本名稱與更新說明（what's new）。
      # 版本名稱格式為「versionCode (versionName)」，例如 0.4.4+30 → 「30 (0.4.4)」。
      # 更新說明會附上這版的最新 commit 與對上一版 tag 的 compare 編輯日誌。
      - name: Prepare Play release metadata
        id: meta
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_CODE=${VERSION_LINE##*+}
          echo "release_name=${VERSION_CODE} (${VERSION_NAME})" >> "$GITHUB_OUTPUT"

          CURRENT_TAG=${GITHUB_REF_NAME}
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          SHA=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=format:'%an')
          SUBJECT=$(git log -1 --pretty=format:'%s')

          # Play 的 what's new 每個語言上限 500 字，且只吃純文字。
          NOTES="最新 commit：${SHA} ${SUBJECT} — ${AUTHOR}"
          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}"$'\n'"編輯日誌：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${CURRENT_TAG}"
          fi

          mkdir -p build/play-whatsnew
          printf '%s' "$NOTES" > build/play-whatsnew/whatsnew-zh-TW
          printf '%s' "$NOTES" > build/play-whatsnew/whatsnew-en-US

      # 當推 v* 標籤時，自動發布至 Google Play Console (內部測試軌道)
      - name: Upload to Google Play (Internal Testing)
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: tw.hamster.yuntool
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: internal
          releaseName: ${{ steps.meta.outputs.release_name }}
          whatsNewDirectory: build/play-whatsnew

