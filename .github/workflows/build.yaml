name: Build & Release APK

on:
  # 只在「刻意」時建置：推 v* tag（發 Release）或手動觸發（只出 artifact）。
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # 建立 GitHub Release 需要

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-project

      # 從 secrets 還原 upload keystore 與 key.properties，讓 release build
      # 用正式（上傳）金鑰簽章。這兩個檔案都在 .gitignore，不會進版控。
      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
        run: |
          flutter build apk --release \
            --dart-define=API_SECRET="$API_SECRET" \
            --dart-define=USE_FIREBASE=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 推 tag 時，順便建立 GitHub Release 並附上 APK（永久下載連結）。
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
